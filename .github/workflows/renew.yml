name: Auto Renew Katabump

on:
  schedule:
    - cron: '22 1 * * *'  # 每天运行（建议：你的注释说是03:17，但cron写的是01:22 UTC）
  workflow_dispatch:      # 允许手动触发

jobs:
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - name: Interval Check
        id: check
        run: |
          # 如果是手动触发 (workflow_dispatch)，则不跳过
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger: bypassing interval check."
            echo "should_skip=false" >> $GITHUB_OUTPUT
          else
            # 计算当前 Unix 天数 (UTC)
            DAYS=$(( $(date -u +%s) / 86400 ))
            REMAINDER=$(( $DAYS % 4 ))
            
            if [ $REMAINDER -ne 0 ]; then
              echo "Interval check failed: skipping today."
              echo "should_skip=true" >> $GITHUB_OUTPUT
            else
              echo "Interval check passed: running today."
              echo "should_skip=false" >> $GITHUB_OUTPUT
            fi
          fi

  auto_renew_katabump:
    needs: pre-check
    # 只有当 should_skip 不为 'true' 时才运行
    if: needs.pre-check.outputs.should_skip != 'true'
    runs-on: ubuntu-22.04
    env:
      ACCOUNTS: ${{ secrets.ACCOUNTS }}
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # 合并安装命令，提高效率
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 \
            libcairo2 libasound2

      - name: Start X Virtual Frame Buffer (Xvfb)
        run: Xvfb :99 -ac &
            
      - name: Run Script in Stealth Mode
        env:
          DISPLAY: ':99'
          HEADLESS: 'false' # 因为使用了 Xvfb，这里设为 false 模拟有头模式以避开检测
        run: |
          python renew_katabump.py
