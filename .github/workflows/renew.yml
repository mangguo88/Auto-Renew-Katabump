name: Auto Renew Katabump

on:
  schedule:
    - cron: '22 1 * * *'  # 每天运行 (UTC 01:22)
  workflow_dispatch:      # 允许手动触发

jobs:
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - name: Interval Check
        id: check
        run: |
          # 如果是手动触发，则强制不跳过
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "手动触发：跳过周期检查，强制运行。"
            echo "should_skip=false" >> $GITHUB_OUTPUT
          else
            # 计算 Unix 天数 (UTC) 逻辑：每 4 天运行一次
            DAYS=$(( $(date -u +%s) / 86400 ))
            REMAINDER=$(( $DAYS % 4 ))
            
            if [ $REMAINDER -ne 0 ]; then
              echo "周期检查：今天不是运行日，已跳过。"
              echo "should_skip=true" >> $GITHUB_OUTPUT
            else
              echo "周期检查：已达到 4 天周期，准备运行。"
              echo "should_skip=false" >> $GITHUB_OUTPUT
            fi
          fi

  auto_renew_katabump:
    needs: pre-check
    if: needs.pre-check.outputs.should_skip != 'true'
    runs-on: ubuntu-22.04
    env:
      ACCOUNTS: ${{ secrets.ACCOUNTS }}
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Google Chrome and Dependencies
        run: |
          # 更新系统并安装 Chrome 及其依赖
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 \
            libcairo2 libasound2
          
          # 下载安装最新的 Chrome 稳定版
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install -y ./google-chrome-stable_current_amd64.deb
          
          # 安装 Python 依赖
          pip install -r requirements.txt

      - name: Start X Virtual Frame Buffer (Xvfb)
        run: |
          # 清理可能残留的进程并启动虚拟屏幕
          sudo killall Xvfb || true
          Xvfb :99 -ac -screen 0 1280x1024x24 &
          sleep 5 # 给虚拟屏幕一点启动时间

      - name: Run Script in Stealth Mode
        env:
          DISPLAY: ':99'
          HEADLESS: 'false'
        run: |
          # 运行续期脚本
          python renew_katabump.py
