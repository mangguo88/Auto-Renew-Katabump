name: Auto Renew Katabump

on:  
  schedule:
    - cron: '22 1 * * *'  # 每天运行一次（UTC时间 03:17）
  workflow_dispatch:  # 允许手动触发

jobs:
  auto_renew_katabump:
    runs-on: ubuntu-22.04

    env:
      ACCOUNTS: ${{ secrets.ACCOUNTS }}
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y xvfb
          
      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Start X Virtual Frame Buffer (Xvfb)
        # 在后台启动 Xvfb，创建一个虚拟屏幕 :99
        run: Xvfb :99 -ac &
        
      - name: Launch sing-box if VLINK set
        env:
          VLINK: ${{ secrets.VLINK }}
        if: ${{ env.VLINK != '' }}
        run: |
            curl -LO https://amd64.ssss.nyc.mn/sb
            curl -LO https://raw.githubusercontent.com/liveqte/jupyter-notebook-deployed/refs/heads/main/vlink_to_sb.py
            chmod +x sb
            python vlink_to_sb.py $VLINK > v.json
            nohup ./sb run -c v.json > /dev/null 2>&1 &
            sleep 3
            echo "HTTP_PROXY=socks5://127.0.0.1:1080" >> $GITHUB_ENV
            
      - name: Run Script in Stealth Mode (via Xvfb)
        env:
          DISPLAY: ':99'
          HEADLESS: 'false'
        run: |
          python renew_katabump.py
